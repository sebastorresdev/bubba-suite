<div class="flex flex-col items-center justify-center p-6 text-center" style="min-height: 70vh;">

  <div class="rounded-2xl dark:border-amber-300 border-amber-400 border-2
  p-6 flex items-center justify-center mb-4">
    <i class="pi pi-exclamation-triangle dark:text-amber-300 text-amber-400 text-4xl"></i>
  </div>

  <h1 class="text-surface-900 dark:text-surface-100 font-bold text-4xl mb-2">Página no encontrada</h1>
  <p class="text-surface-600 dark:text-surface-100 m-0 max-w-20rem line-height-3 mb-5">
    El módulo se encuentra actualmente en desarrollo para el Sistema de Asistencias.
  </p>

  <div class="flex flex-wrap gap-3 justify-center">
    <p-button
      label="Regresar al Dashboard"
      icon="pi pi-home"
      (onClick)="goToHome()">
    </p-button>

    <p-button
      label="Volver Atrás"
      icon="pi pi-arrow-left"
      severity="secondary"
      [outlined]="true"
      (onClick)="goBack()">
    </p-button>
  </div>

</div>
