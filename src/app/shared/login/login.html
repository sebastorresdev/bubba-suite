<div
  class="flex min-h-screen w-screen bg-surface-50 dark:bg-surface-950 items-center justify-center p-4 transition-colors duration-300 relative overflow-hidden">

  <!-- Efectos decorativos de fondo -->
  <div class="absolute -top-40 -left-40 w-96 h-96 bg-primary-400/20 dark:bg-primary-600/10 rounded-full blur-3xl"></div>
  <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-green-400/20 dark:bg-green-600/10 rounded-full blur-3xl"></div>

  <div class="w-full max-w-md z-10 animate-fade-in">
    <p-card
      class="border border-surface-200 dark:border-surface-800 shadow-xl rounded-2xl bg-surface-0 dark:bg-surface-900/90 backdrop-blur-md">
      <ng-template #header>
        <div class="text-center pt-8 px-6">
          <div class="flex justify-center mb-6">
            <img src="https://bubbabags.com.pe/cdn/shop/files/Logo_bubba.webp?v=1712543297&width=300" alt="Bubba Bags"
              class="h-12 w-auto object-contain transition-all duration-300 dark:invert" />
          </div>
          <h1 class="text-surface-900 dark:text-surface-0 font-bold text-2xl mt-0 mb-1">
            Plataforma Bubba
          </h1>
          <p class="text-surface-500 dark:text-surface-400 text-sm mt-0">
            Ingresa tus credenciales de asistencia
          </p>
        </div>
      </ng-template>

      <div class="px-2">
        <form [formGroup]="form" (ngSubmit)="login()" class="flex flex-col gap-4">
          <!-- Usuario -->
          <div class="flex flex-col gap-1.5">
            <label class="text-surface-700 dark:text-surface-300 text-sm font-medium">Nombre de Usuario</label>
            <p-iconfield>
              <p-inputicon class="pi pi-user text-surface-400" />
              <input pInputText type="text" formControlName="username" placeholder="Ingresa tu usuario"
                class="w-full text-base" pSize="small" />
            </p-iconfield>
          </div>

          <!-- Contraseña -->
          <div class="flex flex-col gap-1.5">
            <label class="text-surface-700 dark:text-surface-300 text-sm font-medium">Contraseña</label>
            <p-iconfield>
              <p-inputicon class="pi pi-lock text-surface-400 z-10" />
              <p-password formControlName="password" fluid placeholder="Ingresa tu contraseña" [toggleMask]="true"
                autocomplete="off" [feedback]="false" inputStyleClass="w-full text-base pl-10" />
            </p-iconfield>
          </div>

          <!-- Error -->
          @if (errorMessage()) {
          <p-message severity="error" styleClass="w-full mt-2">
            {{ errorMessage()! }}
          </p-message>
          }

          <!-- Botón -->
          <div class="mt-4">
            <p-button label="Iniciar sesión" icon="pi pi-sign-in" type="submit" [loading]="loading()"
              [disabled]="form.invalid"
              styleClass="w-full py-2.5 font-semibold text-base transition-transform active:scale-[0.98]" />
          </div>
        </form>
      </div>

      <ng-template #footer>
        <div
          class="text-center text-surface-400 dark:text-surface-600 text-xs py-4 border-t border-surface-150 dark:border-surface-800/60 mt-4">
          &copy; 2026 Bubba Bags. Todos los derechos reservados.
        </div>
      </ng-template>
    </p-card>
  </div>
</div>
